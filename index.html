<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>APEX GYM | Yönetim Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;
  --bg2:#141417;
  --bg3:#1c1c20;
  --red:#e2001a;
  --red-dark:#9c0013;
  --red-glow:rgba(226,0,26,.35);
  --white:#f3f3f4;
  --muted:#8d8d94;
  --border:#2a2a2f;
  --green:#2fbf6a;
  --amber:#e2a300;
  --radius:14px;
  --disp:'Bebas Neue', Impact, sans-serif;
  --body:'Inter', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#2c2c31; border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit; text-decoration:none;}
button{font-family:var(--body); cursor:pointer;}
input,select,textarea{font-family:var(--body);}
h1,h2,h3,.disp{font-family:var(--disp); letter-spacing:.5px;}
:focus-visible{outline:2px solid var(--red); outline-offset:2px;}

.hairline{height:1px; background:linear-gradient(90deg, var(--red) 0%, transparent 70%); width:100%; opacity:.6;}

/* ---------- WATERMARK BACKGROUND ICONS ---------- */
.bg-wm{position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
.bg-wm svg{position:absolute; opacity:.05; stroke:var(--red); fill:none;}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  position:relative; background:
    radial-gradient(circle at 15% 20%, rgba(226,0,26,.12), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(226,0,26,.10), transparent 45%),
    var(--bg);
}
.login-wrap{position:relative; z-index:2; width:100%; max-width:960px; padding:24px;}
.brand{text-align:center; margin-bottom:40px;}
.brand .logo{font-family:var(--disp); font-size:56px; letter-spacing:3px; line-height:1;}
.brand .logo span{color:var(--red);}
.brand .tag{color:var(--muted); font-size:13px; letter-spacing:4px; text-transform:uppercase; margin-top:6px;}
.login-choice{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
.choice-card{
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  padding:36px 24px; text-align:center; cursor:pointer; position:relative; overflow:hidden;
  transition:transform .18s ease, border-color .18s ease;
}
.choice-card:hover{transform:translateY(-4px); border-color:var(--red);}
.choice-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--red-dark), var(--red));
}
.choice-card .ic{width:52px; height:52px; margin:0 auto 16px;}
.choice-card h3{font-size:30px; margin-bottom:6px;}
.choice-card p{color:var(--muted); font-size:13px;}

.login-form{
  max-width:380px; margin:0 auto; background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:32px; position:relative;
}
.login-form h3{font-size:28px; margin-bottom:4px;}
.login-form .sub{color:var(--muted); font-size:13px; margin-bottom:22px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 13px; background:var(--bg3); border:1px solid var(--border);
  border-radius:9px; color:var(--white); font-size:14px;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--red);}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 20px; border-radius:9px; border:none; font-weight:700; font-size:14px;
  background:var(--red); color:#fff; transition:background .15s;
}
.btn:hover{background:var(--red-dark);}
.btn.block{width:100%;}
.btn.ghost{background:transparent; border:1px solid var(--border); color:var(--white);}
.btn.ghost:hover{border-color:var(--red);}
.btn.sm{padding:7px 12px; font-size:12px;}
.btn.danger{background:#3a3a3f;}
.btn.danger:hover{background:var(--red-dark);}
.err{color:var(--red); font-size:13px; margin-top:10px; min-height:16px;}
.back-link{display:block; text-align:center; margin-top:16px; color:var(--muted); font-size:13px;}
.back-link:hover{color:var(--white);}

/* ---------- APP SHELL ---------- */
#app-shell{display:flex; min-height:100vh;}
.sidebar{
  width:230px; flex-shrink:0; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
}
.sidebar .brand-mini{padding:22px 20px 16px; font-family:var(--disp); font-size:26px; letter-spacing:2px; border-bottom:1px solid var(--border);}
.sidebar .brand-mini span{color:var(--red);}
.sidebar nav{flex:1; padding:14px 10px; overflow-y:auto;}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:9px;
  color:var(--muted); font-size:14px; font-weight:600; margin-bottom:3px; cursor:pointer;
  transition:background .15s, color .15s; border-left:3px solid transparent;
}
.nav-item svg{width:18px; height:18px; flex-shrink:0;}
.nav-item:hover{background:var(--bg3); color:var(--white);}
.nav-item.active{background:linear-gradient(90deg, var(--red-glow), transparent); color:#fff; border-left-color:var(--red);}
.sidebar .foot{padding:14px 16px; border-top:1px solid var(--border);}
.who{font-size:12px; color:var(--muted); margin-bottom:8px;}
.who b{color:var(--white);}

.main{flex:1; min-width:0; position:relative;}
.topbar{
  display:none; align-items:center; justify-content:space-between; padding:14px 16px;
  background:var(--bg2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20;
}
.topbar .logo{font-family:var(--disp); font-size:22px;}
.topbar .logo span{color:var(--red);}
.burger{width:34px; height:34px; border-radius:8px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center;}
.page{padding:26px 30px; position:relative; z-index:1;}
.page-head{margin-bottom:22px; position:relative;}
.page-head h2{font-size:34px;}
.page-head p{color:var(--muted); font-size:13px; margin-top:2px;}

/* mobile bottom nav */
.bottom-nav{display:none;}

/* ---------- GRID / CARDS ---------- */
.grid{display:grid; gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.card{
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; position:relative; overflow:hidden;
}
.card .cap{font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:8px;}
.card .val{font-family:var(--disp); font-size:36px; line-height:1;}
.card .val small{font-family:var(--body); font-size:13px; color:var(--muted); font-weight:600;}
.stat-red::before{content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--red);}

.clock-card{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
.clock-time{font-family:var(--disp); font-size:44px; letter-spacing:2px;}
.clock-date{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-top:4px;}

.hero-photo{
  border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; position:relative;
  min-height:230px; display:flex; align-items:flex-end; background:var(--bg2);
}
.hero-photo svg{position:absolute; inset:0; width:100%; height:100%;}
.hero-photo .cap-box{position:relative; z-index:2; padding:20px; background:linear-gradient(0deg, rgba(0,0,0,.75), transparent);}
.hero-photo .cap-box h3{font-size:26px;}
.hero-photo .cap-box p{color:#d6d6d8; font-size:12px; max-width:360px;}

.list-row{
  display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--border);
  font-size:13px;
}
.list-row:last-child{border-bottom:none;}
.badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
.badge.green{background:rgba(47,191,106,.15); color:var(--green);}
.badge.red{background:rgba(226,0,26,.15); color:#ff5468;}
.badge.amber{background:rgba(226,163,0,.15); color:var(--amber);}
.badge.muted{background:var(--bg3); color:var(--muted);}

/* table-ish list */
.table-wrap{background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
.t-head, .t-row{display:grid; align-items:center; gap:10px; padding:13px 16px; font-size:13px;}
.t-head{background:var(--bg3); color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1px; font-weight:700;}
.t-row{border-top:1px solid var(--border);}
.t-row:hover{background:rgba(255,255,255,.02);}

.toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:center;}
.toolbar input, .toolbar select{padding:10px 13px; background:var(--bg2); border:1px solid var(--border); border-radius:9px; color:var(--white); font-size:13px;}
.spacer{flex:1;}

.tabs{display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid var(--border); flex-wrap:wrap;}
.tab{padding:10px 16px; font-size:13px; font-weight:700; color:var(--muted); border-bottom:2px solid transparent; cursor:pointer;}
.tab.active{color:var(--white); border-bottom-color:var(--red);}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;}
.modal{background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:480px; max-height:88vh; overflow-y:auto; padding:26px;}
.modal.wide{max-width:680px;}
.modal h3{font-size:24px; margin-bottom:16px;}
.modal-close{position:absolute; top:16px; right:20px; color:var(--muted); font-size:22px; cursor:pointer;}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:18px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

.empty{padding:40px 20px; text-align:center; color:var(--muted); font-size:13px;}

/* stopwatch */
.stopwatch-face{
  width:280px; height:280px; border-radius:50%; border:6px solid var(--bg3); position:relative;
  display:flex; align-items:center; justify-content:center; margin:20px auto; background:radial-gradient(circle at 50% 30%, #1a1a1e, #0d0d0f);
  box-shadow:0 0 0 2px var(--border), 0 0 40px rgba(226,0,26,.15) inset;
}
.stopwatch-face .sw-time{font-family:var(--disp); font-size:48px; letter-spacing:1px;}
.stopwatch-face .sw-ms{font-size:16px; color:var(--muted); font-family:var(--body);}
.sw-controls{display:flex; gap:12px; justify-content:center; margin-top:10px;}
.sw-btn{width:64px; height:64px; border-radius:50%; border:none; font-weight:800; font-size:13px;}
.sw-btn.start{background:var(--green); color:#04270f;}
.sw-btn.stop{background:var(--red); color:#fff;}
.sw-btn.lap{background:var(--bg3); color:#fff; border:1px solid var(--border);}
.laps{max-width:340px; margin:20px auto 0;}

/* exercise cards */
.exercise-card{background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px;}
.exercise-card .ex-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.exercise-card h4{font-size:15px;}
.exercise-card .region-tag{font-size:10px; color:var(--red); text-transform:uppercase; letter-spacing:1px; font-weight:800;}
.exercise-card p{color:var(--muted); font-size:12.5px; margin-top:6px; line-height:1.5;}
.exercise-card .sr{font-size:12px; color:var(--white); margin-top:8px; font-weight:700;}
.exercise-card .sr span{color:var(--red);}

.day-block{margin-bottom:22px;}
.day-block h4{font-size:18px; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
.day-block h4::before{content:''; width:8px; height:8px; background:var(--red); border-radius:50%; display:inline-block;}

.progress-bar{height:6px; background:var(--bg3); border-radius:4px; overflow:hidden; margin-top:8px;}
.progress-bar > div{height:100%; background:linear-gradient(90deg, var(--red-dark), var(--red));}

@media (max-width:980px){
  .grid.cols-4{grid-template-columns:repeat(2,1fr);}
  .grid.cols-3{grid-template-columns:repeat(2,1fr);}
  .grid.cols-2{grid-template-columns:1fr;}
  .login-choice{grid-template-columns:1fr;}
}
@media (max-width:820px){
  .sidebar{display:none;}
  .topbar{display:flex;}
  .page{padding:18px 16px 90px;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-top:1px solid var(--border);
    z-index:30; overflow-x:auto; padding:6px 4px;
  }
  .bottom-nav .bn-item{
    flex:1; min-width:66px; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:7px 4px; color:var(--muted); font-size:9.5px; font-weight:700; text-transform:uppercase;
  }
  .bottom-nav .bn-item svg{width:19px; height:19px;}
  .bottom-nav .bn-item.active{color:var(--red);}
  .t-head{display:none;}
  .t-row{grid-template-columns:1fr !important; gap:4px; padding:14px 16px;}
  .t-row .tcell::before{content:attr(data-label); display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px;}
}
</style>
</head>

/* ---------- HELPERS ---------- */
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '-'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function addDays(iso, days){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+Number(days)); return d.toISOString().slice(0,10); }
function addMonths(iso, months){ const d=new Date(iso+'T00:00:00'); d.setMonth(d.getMonth()+Number(months)); return d.toISOString().slice(0,10); }
function daysLeft(endIso){
  const end = new Date(endIso+'T00:00:00'); const now = new Date(todayISO()+'T00:00:00');
  return Math.round((end-now)/86400000);
}
function money(n){ return Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:0})+' ₺'; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function findStudent(id){ return DATA.students.find(s=>s.id===id); }
function totalDebt(s){
  const paid = (s.payments||[]).reduce((a,p)=>a+Number(p.amount),0);
  return Math.max(0, Number(s.packageFee||0) - paid);
}

let clockInterval = null;

  };
  tick(); clockInterval = setInterval(tick, 1000);
}

/* ---------- BUSINESS: KAYIT DONDURMA ---------- */
function bizFreeze(page){
  const q = STATE.freezeSearch.toLowerCase();
  const students = DATA.students.filter(s=>(s.name+' '+s.surname).toLowerCase().includes(q));
  const pendingReqs = [];
  DATA.students.forEach(s=> (s.freezeRequests||[]).forEach(r=> pendingReqs.push({...r, studentId:s.id, studentName:s.name+' '+s.surname})));
  pendingReqs.sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  page.innerHTML = `
    <div class="page-head"><h2>Kayıt Dondurma</h2><p>Kayıtları dondurun ve sporcu taleplerini yönetin</p></div>
    <div class="tabs">
      <div class="tab ${STATE.freezeTab==='list'?'active':''}" data-tab="list">Sporcu Listesi</div>
      <div class="tab ${STATE.freezeTab==='requests'?'active':''}" data-tab="requests">İstekler ${pendingReqs.filter(r=>r.status==='pending').length? `<span class="badge red">${pendingReqs.filter(r=>r.status==='pending').length}</span>`:''}</div>
    </div>
    <div id="freeze-body"></div>
  `;
  page.querySelectorAll('[data-tab]').forEach(el=> el.addEventListener('click', ()=>{ STATE.freezeTab = el.getAttribute('data-tab'); bizFreeze(page); }));
  const body = document.getElementById('freeze-body');

  if(STATE.freezeTab==='list'){
    body.innerHTML = `
      <div class="toolbar"><input type="text" id="freeze-search" placeholder="İsim ara..." value="${escapeHtml(STATE.freezeSearch)}"></div>
      <div class="table-wrap">
        <div class="t-head" style="grid-template-columns:1.6fr 1fr 1fr .8fr;"><div>Ad Soyad</div><div>Bitiş Tarihi</div><div>Durum</div><div></div></div>
        ${students.length? students.map(s=>`
          <div class="t-row" style="grid-template-columns:1.6fr 1fr 1fr .8fr;">
            <div class="tcell" data-label="Ad Soyad">${escapeHtml(s.name)} ${escapeHtml(s.surname)}</div>
            <div class="tcell" data-label="Bitiş">${fmtDate(s.endDate)}</div>
            <div class="tcell" data-label="Durum">${s.frozen? '<span class="badge amber">Donduruldu</span>':'<span class="badge green">Aktif</span>'}</div>
            <div class="tcell"><button class="btn sm danger" data-freeze="${s.id}">Kayıt Dondur</button></div>
          </div>
        `).join('') : `<div class="empty">Sporcu bulunamadı.</div>`}
      </div>
    `;
    document.getElementById('freeze-search').addEventListener('input', e=>{ STATE.freezeSearch=e.target.value; bizFreeze(page); });
    body.querySelectorAll('[data-freeze]').forEach(el=> el.addEventListener('click', ()=> openFreezeModal(el.getAttribute('data-freeze'))));
  } else {
    body.innerHTML = `
      <div class="table-wrap">
        <div class="t-head" style="grid-template-columns:1.4fr .7fr 1.4fr 1fr 1fr;"><div>Sporcu</div><div>Gün</div><div>Sebep</div><div>Durum</div><div></div></div>
        ${pendingReqs.length? pendingReqs.map(r=>`
          <div class="t-row" style="grid-template-columns:1.4fr .7fr 1.4fr 1fr 1fr;">
            <div class="tcell" data-label="Sporcu">${escapeHtml(r.studentName)}</div>
            <div class="tcell" data-label="Gün">${r.days} gün</div>
            <div class="tcell" data-label="Sebep">${escapeHtml(r.reason)}</div>
            <div class="tcell" data-label="Durum">${r.status==='pending'?'<span class="badge amber">Bekliyor</span>':r.status==='approved'?'<span class="badge green">Onaylandı</span>':'<span class="badge red">Reddedildi</span>'}</div>
            <div class="tcell">${r.status==='pending'? `<button class="btn sm" data-approve="${r.studentId}|${r.id}" style="margin-right:6px;">Onayla</button><button class="btn sm danger" data-reject="${r.studentId}|${r.id}">Reddet</button>`:''}</div>
          </div>
        `).join('') : `<div class="empty">Bekleyen istek yok.</div>`}
      </div>
    `;
    body.querySelectorAll('[data-approve]').forEach(el=> el.addEventListener('click', ()=>{
      const [sid, rid] = el.getAttribute('data-approve').split('|');
      const s = findStudent(sid); const r = s.freezeRequests.find(x=>x.id===rid);
      r.status='approved'; s.frozen=true; s.endDate = addDays(s.endDate, r.days);
      s.freezeHistory = s.freezeHistory||[]; s.freezeHistory.push({id:uid(), date:todayISO(), days:r.days, reason:r.reason});
      saveData(); bizFreeze(page);
    }));
    body.querySelectorAll('[data-reject]').forEach(el=> el.addEventListener('click', ()=>{
      const [sid, rid] = el.getAttribute('data-reject').split('|');
      const s = findStudent(sid); const r = s.freezeRequests.find(x=>x.id===rid);
      r.status='rejected'; saveData(); bizFreeze(page);
    }));
  }
}

        </div>
        <textarea id="pe-desc" rows="2" placeholder="Açıklama" style="width:100%; margin-top:10px; padding:11px; background:var(--bg3); border:1px solid var(--border); border-radius:9px; color:#fff;"></textarea>
        <input type="text" id="pe-reps" placeholder="Tekrar (örn. 12 veya 40 sn)" style="width:100%; margin-top:10px; padding:11px; background:var(--bg3); border:1px solid var(--border); border-radius:9px; color:#fff;">
        <button class="btn block" id="pe-add-btn" style="margin-top:12px;">+ Egzersizi Programa Ekle</button>
        <div class="modal-actions"><button class="btn ghost" id="pe-close2">Kapat</button></div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  const close = ()=>{ document.getElementById('modal-bg').remove(); if(onDone) onDone(); };
  document.getElementById('modal-close').addEventListener('click', close);
  document.getElementById('pe-close2').addEventListener('click', close);

  function fillExerciseOptions(){
    const region = document.getElementById('pe-region').value;
    const exSel = document.getElementById('pe-exercise');
    exSel.innerHTML = EXLIB[region].map(x=>`<option>${x.name}</option>`).join('');
    autoFillFromLib();
  }
  function autoFillFromLib(){
    const region = document.getElementById('pe-region').value;
    const name = document.getElementById('pe-exercise').value;
    const ex = EXLIB[region].find(x=>x.name===name);
    if(ex){
      document.getElementById('pe-sets').value = ex.sets;
      document.getElementById('pe-reps').value = ex.reps;
      document.getElementById('pe-desc').value = ex.desc;
    }
  }
  document.getElementById('pe-region').addEventListener('change', fillExerciseOptions);
  document.getElementById('pe-exercise').addEventListener('change', autoFillFromLib);
  fillExerciseOptions();

  function renderList(){
    const grouped = document.getElementById('pe-grouped').checked;
    document.getElementById('pe-day').style.display = grouped? 'block':'none';
    const body = document.getElementById('pe-body');
    if(grouped){
      body.innerHTML = DAYS.map(d=>{
        const items = (prog.days[d]||[]);
        return `<div class="day-block"><h4>${d}</h4>${items.length? items.map(it=>renderExCard(it, d)).join('') : `<div class="empty" style="padding:14px;">Bu gün için egzersiz eklenmedi.</div>`}</div>`;
      }).join('');
    } else {
      const items = prog.list||[];
      body.innerHTML = items.length? items.map(it=>renderExCard(it, null)).join('') : `<div class="empty">Henüz egzersiz eklenmedi.</div>`;
    }
    body.querySelectorAll('[data-rm]').forEach(el=> el.addEventListener('click', ()=>{
      const [day, idx] = el.getAttribute('data-rm').split('|');
      if(day==='_'){ prog.list.splice(Number(idx),1); } else { prog.days[day].splice(Number(idx),1); }
      saveData(); renderList();
    }));
  }
  function renderExCard(it, day){
    const idx = day? prog.days[day].indexOf(it) : prog.list.indexOf(it);
    const key = (day||'_')+'|'+idx;
    return `<div class="exercise-card">
      <div class="ex-top"><div><div class="region-tag">${it.region}</div><h4>${escapeHtml(it.name)}</h4></div><button class="btn sm danger" data-rm="${key}">Kaldır</button></div>
      <p>${escapeHtml(it.desc)}</p>
      <div class="sr"><span>${it.sets} set</span> × <span>${it.reps}</span> tekrar</div>
    </div>`;
  }
  document.getElementById('pe-grouped').addEventListener('change', e=>{ prog.grouped = e.target.checked; saveData(); renderList(); });
  document.getElementById('pe-add-btn').addEventListener('click', ()=>{
    const grouped = document.getElementById('pe-grouped').checked;
    const region = document.getElementById('pe-region').value;
    const name = document.getElementById('pe-exercise').value;
    const item = { region, name, sets: Number(document.getElementById('pe-sets').value)||3, reps: document.getElementById('pe-reps').value||'12', desc: document.getElementById('pe-desc').value.trim() };
    if(grouped){
      const day = document.getElementById('pe-day').value;
      prog.days[day] = prog.days[day]||[]; prog.days[day].push(item);
    } else {
      prog.list = prog.list||[]; prog.list.push(item);
    }
    saveData(); renderList();
  });
  renderList();
}

  const others = DATA.accounts.filter(a=>!a.main);
  page.innerHTML = `
    <div class="page-head"><h2>Güvenlik</h2><p>Hesap yönetimi ve erişim ayarları</p></div>
    <div class="grid cols-2" style="align-items:start;">

        <form id="pw-form" style="margin-top:12px;">
          <div class="field"><label>Kullanıcı Adı</label><input type="text" value="${escapeHtml(main.username)}" disabled></div>
          <div class="field"><label>Yeni Şifre</label><input type="text" id="pw-new" required></div>
          <button class="btn" type="submit">Şifreyi Güncelle</button>
          <div class="err" id="pw-msg" style="color:var(--green);"></div>
        </form>
      </div>
      <div class="card">
        <div class="cap">Yeni Yönetici Hesabı Ekle</div>
        <form id="acc-form" style="margin-top:12px;">
          <div class="field"><label>Kullanıcı Adı</label><input type="text" id="acc-user" required></div>
          <div class="field"><label>Şifre</label><input type="text" id="acc-pass" required></div>
          <button class="btn" type="submit">Hesap Oluştur</button>
          <div class="err" id="acc-msg"></div>
        </form>
      </div>
    </div>
    <div class="card" style="margin-top:16px;">
      <div class="cap">Diğer Yönetici Hesapları</div>
      ${others.length? others.map(a=>`<div class="list-row"><span>${escapeHtml(a.username)}</span><button class="btn sm danger" data-del-acc="${a.id}">Sil</button></div>`).join('') : `<div class="empty">Ek hesap bulunmuyor.</div>`}
    </div>
  `;
  document.getElementById('pw-form').addEventListener('submit', e=>{
    e.preventDefault(); main.password = document.getElementById('pw-new').value; saveData();
    document.getElementById('pw-msg').textContent = 'Şifre güncellendi.';
  });
  document.getElementById('acc-form').addEventListener('submit', e=>{
    e.preventDefault();
    const u = document.getElementById('acc-user').value.trim();
    if(DATA.accounts.some(a=>a.username===u)){ document.getElementById('acc-msg').textContent='Bu kullanıcı adı zaten var.'; return; }
    DATA.accounts.push({id:uid(), username:u, password:document.getElementById('acc-pass').value, main:false});
    saveData(); bizSecurity(page);
  });
  page.querySelectorAll('[data-del-acc]').forEach(el=> el.addEventListener('click', ()=>{
    DATA.accounts = DATA.accounts.filter(a=>a.id!==el.getAttribute('data-del-acc')); saveData(); bizSecurity(page);
  }));
}

const ATH_MENU = [
  {id:'overview', label:'Genel Bakış', icon:'dashboard'},
  {id:'programs', label:'Programlarım', icon:'program'},
  {id:'vitamin', label:'Vitamin Bar', icon:'vitamin'},
  {id:'freeze', label:'Kayıt Dondurma Talebi', icon:'freeze'},
  {id:'timer', label:'Kronometre', icon:'timer'},
];
function renderAthShell(){
  const s = findStudent(STATE.currentStudentId);
  if(!s){ logout(); return; }
  const menuHtml = ATH_MENU.map(m=>`<div class="nav-item ${STATE.athScreen===m.id?'active':''}" data-nav="${m.id}">${icon(m.icon)}<span>${m.label}</span></div>`).join('');
  const bottomNavHtml = ATH_MENU.map(m=>`<div class="bn-item ${STATE.athScreen===m.id?'active':''}" data-nav="${m.id}">${icon(m.icon)}<span>${m.label}</span></div>`).join('');
  root.innerHTML = `
  <div id="app-shell">
    <aside class="sidebar">
      <div class="brand-mini">APEX<span>GYM</span></div>
      <nav>${menuHtml}</nav>
      <div class="foot">
        <div class="who">Hoş geldin, <b>${escapeHtml(s.name)}</b></div>
        <button class="btn ghost block sm" id="logout-btn">${icon('logout')} Çıkış Yap</button>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <div class="logo">APEX<span>GYM</span></div>
        <button class="burger" id="logout-btn-m">${icon('logout')}</button>
      </div>
      <div class="page" id="page-content"></div>
      <div class="bottom-nav">${bottomNavHtml}</div>
    </div>
  </div>`;
  root.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click', ()=>{ STATE.athScreen = el.getAttribute('data-nav'); render(); }));

}

function todaysExercises(s){
  const dayName = TR_DAY_NAMES[new Date().getDay()];
  const fromAssigned = (s.program.assigned.grouped ? (s.program.assigned.days[dayName]||[]) : []);
  const fromOwn = (s.program.own.grouped ? (s.program.own.days[dayName]||[]) : []);
  return {dayName, items:[...fromAssigned, ...fromOwn]};
}

function athOverview(page, s){
  const dl = daysLeft(s.endDate);
  const {dayName, items} = todaysExercises(s);
  page.innerHTML = `
    <div class="page-head"><h2>Genel Bakış</h2><p>Bugün: ${dayName}</p></div>
    <div class="grid cols-3" style="margin-bottom:16px;">
      <div class="card stat-red"><div class="cap">Kalan Gün</div><div class="val ${dl<=5?'':''}" style="color:${dl<=5?'#ff5468':'inherit'}">${dl} <small>gün</small></div></div>
      <div class="card clock-card"><div class="clock-time" id="clock-time">--:--:--</div><div class="clock-date" id="clock-date">-</div></div>
      <div class="card stat-red"><div class="cap">Paket</div><div class="val" style="font-size:24px;">${s.period} Aylık</div></div>
    </div>
    <div class="hero-photo" style="margin-bottom:16px;">${ART.lifter}<div class="cap-box"><h3>${dayName} Antrenmanı</h3><p>Bugün hedefine bir adım daha yaklaş.</p></div></div>
    <div class="card">
      <div class="cap">Günün Antrenman Programı</div>
      ${items.length? items.map(it=>`
        <div class="exercise-card"><div class="ex-top"><div><div class="region-tag">${it.region}</div><h4>${escapeHtml(it.name)}</h4></div></div><p>${escapeHtml(it.desc)}</p><div class="sr"><span>${it.sets} set</span> × <span>${it.reps}</span> tekrar</div></div>
      `).join('') : `<div class="empty">Bugün için planlanmış bir antrenman bulunmuyor.</div>`}

      <div class="tab ${tab==='assigned'?'active':''}" data-ptab="assigned">İşletme Programı</div>
      <div class="tab ${tab==='own'?'active':''}" data-ptab="own">Kendi Programım</div>
    </div>
    <div id="prog-body"></div>
  `;
  page.querySelectorAll('[data-ptab]').forEach(el=> el.addEventListener('click', ()=>{ STATE.athProgTab = el.getAttribute('data-ptab'); athPrograms(page, s); }));

  function list(items){
    return items.length? items.map(it=>`<div class="exercise-card"><div class="region-tag">${it.region}</div><h4>${escapeHtml(it.name)}</h4><p>${escapeHtml(it.desc)}</p><div class="sr"><span>${it.sets} set</span> × <span>${it.reps}</span> tekrar</div></div>`).join('') : `<div class="empty">Egzersiz eklenmedi.</div>`;

/* ---------- ATHLETE: KRONOMETRE ---------- */
let swState = { running:false, startTs:0, elapsed:0, laps:[], interval:null };
function athTimer(page, s){
  page.innerHTML = `
    <div class="page-head"><h2>Kronometre</h2><p>Antrenman sürelerini ölç, turları kaydet</p></div>
    <div class="stopwatch-face"><div><div class="sw-time" id="sw-time">00:00</div><div class="sw-ms" id="sw-ms">.00</div></div></div>
    <div class="sw-controls">
      <button class="sw-btn ${swState.running?'stop':'start'}" id="sw-toggle">${swState.running?'Durdur':'Başlat'}</button>
      <button class="sw-btn lap" id="sw-lap">Tur</button>
      <button class="sw-btn lap" id="sw-reset">Sıfırla</button>
    </div>
    <div class="laps" id="sw-laps"></div>
  `;
  renderSwTime(); renderLaps();
  document.getElementById('sw-toggle').addEventListener('click', ()=>{
    if(swState.running){
      swState.running=false; swState.elapsed += Date.now()-swState.startTs; clearInterval(swState.interval);
    } else {
      swState.running=true; swState.startTs=Date.now();
      swState.interval = setInterval(renderSwTime, 47);
    }
    athTimer(page, s);
  });
  document.getElementById('sw-lap').addEventListener('click', ()=>{
    const total = swState.elapsed + (swState.running? Date.now()-swState.startTs : 0);
    swState.laps.push(total); renderLaps();
  });
  document.getElementById('sw-reset').addEventListener('click', ()=>{
    clearInterval(swState.interval); swState = {running:false, startTs:0, elapsed:0, laps:[], interval:null}; athTimer(page, s);
  });
}
function fmtStopwatch(ms){
  const totalSec = Math.floor(ms/1000);
  const mm = String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss = String(totalSec%60).padStart(2,'0');
  const cs = String(Math.floor((ms%1000)/10)).padStart(2,'0');
  return {main:`${mm}:${ss}`, ms:'.'+cs};
}
function renderSwTime(){
  const t = document.getElementById('sw-time'); if(!t) return;
  const total = swState.elapsed + (swState.running? Date.now()-swState.startTs : 0);
  const f = fmtStopwatch(total);
  t.textContent = f.main; document.getElementById('sw-ms').textContent = f.ms;
}
function renderLaps(){
  const el = document.getElementById('sw-laps'); if(!el) return;
  el.innerHTML = swState.laps.length? swState.laps.slice().reverse().map((l,i)=>{
    const idx = swState.laps.length-i;
    return `<div class="list-row"><span>Tur ${idx}</span><span>${fmtStopwatch(l).main}${fmtStopwatch(l).ms}</span></div>`;
  }).join('') : `<div class="empty">Henüz tur kaydedilmedi.</div>`;
}

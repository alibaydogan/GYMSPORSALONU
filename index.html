<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>APEX GYM | Modern Yönetim Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;0,900;1,800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
:root{
  --bg:#09090b;
  --bg2:#121214;
  --bg3:#1c1c1f;
  --red:#e2001a;
  --red-dark:#9c0013;
  --red-glow:rgba(226,0,26,.35);
  --white:#f3f3f4;
  --muted:#8d8d94;
  --border:#27272a;
  --green:#10b981;
  --amber:#f59e0b;
  --radius:16px;
  --disp:'Montserrat', sans-serif;
  --body:'Poppins', sans-serif;
  --shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#27272a; border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--red);}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit; text-decoration:none;}
button{font-family:var(--body); cursor:pointer;}
input,select,textarea{font-family:var(--body);}
h1,h2,h3,.disp{font-family:var(--disp); text-transform:uppercase; letter-spacing:0.5px;}
:focus-visible{outline:2px solid var(--red); outline-offset:2px;}

.hairline{height:1px; background:linear-gradient(90deg, var(--red) 0%, transparent 70%); width:100%; opacity:.6;}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  position:relative; background:
    radial-gradient(circle at 15% 20%, rgba(226,0,26,.08), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(226,0,26,.05), transparent 45%),
    var(--bg);
}
.login-wrap{position:relative; z-index:2; width:100%; max-width:960px; padding:24px;}
.brand{text-align:center; margin-bottom:40px;}
.brand .logo{font-family:var(--disp); font-size:64px; font-weight:900; letter-spacing:2px; line-height:1;}
.brand .logo span{color:var(--red);}
.brand .tag{color:var(--muted); font-size:14px; letter-spacing:4px; text-transform:uppercase; margin-top:8px;}
.login-choice{display:grid; grid-template-columns:1fr 1fr; gap:24px;}
.choice-card{
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  padding:40px 24px; text-align:center; cursor:pointer; position:relative; overflow:hidden;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow:var(--shadow);
}
.choice-card:hover{transform:translateY(-6px); border-color:var(--red); box-shadow: 0 20px 40px -10px rgba(226,0,26,0.2);}
.choice-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, var(--red-dark), var(--red));
}
.choice-card .ic{width:60px; height:60px; margin:0 auto 20px; color:var(--white);}
.choice-card h3{font-size:28px; margin-bottom:8px;}
.choice-card p{color:var(--muted); font-size:14px;}

.login-form{
  max-width:400px; margin:0 auto; background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:36px; box-shadow:var(--shadow);
}
.login-form h3{font-size:28px; margin-bottom:6px;}
.login-form .sub{color:var(--muted); font-size:14px; margin-bottom:26px;}
.field{margin-bottom:18px;}
.field label{display:block; font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;}
.field input, .field select, .field textarea{
  width:100%; padding:13px 16px; background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; color:var(--white); font-size:14px; transition:border-color .2s;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--red);}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:13px 24px; border-radius:10px; border:none; font-weight:600; font-size:14px;
  background:var(--red); color:#fff; transition:all .2s; cursor:pointer; text-transform:uppercase; letter-spacing:.5px;
}
.btn:hover{background:var(--red-dark); transform:translateY(-2px);}
.btn.block{width:100%;}
.btn.ghost{background:transparent; border:1px solid var(--border); color:var(--white);}
.btn.ghost:hover{border-color:var(--red); background:rgba(226,0,26,.05);}
.btn.sm{padding:8px 14px; font-size:12px;}
.btn.danger{background:#2a2a2f;}
.btn.danger:hover{background:var(--red-dark);}
.err{color:#ff5468; font-size:13px; margin-top:12px; min-height:18px; font-weight:500;}
.back-link{display:block; text-align:center; margin-top:20px; color:var(--muted); font-size:13px; font-weight:500;}
.back-link:hover{color:var(--white);}

/* ---------- TOP NAVIGATION APP SHELL ---------- */
#app-shell{display:flex; flex-direction:column; min-height:100vh;}
.top-nav-bar {
  display:flex; align-items:center; justify-content:space-between; padding:12px 30px;
  background:rgba(18, 18, 20, 0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
}
.top-nav-bar .logo-area{display:flex; align-items:center; gap:30px;}
.top-nav-bar .brand-mini{font-family:var(--disp); font-size:28px; font-weight:900; letter-spacing:1px;}
.top-nav-bar .brand-mini span{color:var(--red);}

.main-nav {display:flex; align-items:center; gap:8px;}
.nav-item {
  display:flex; align-items:center; gap:8px; padding:10px 16px; border-radius:100px;
  color:var(--muted); font-size:13px; font-weight:600; cursor:pointer;
  transition:all .2s ease;
}
.nav-item svg{width:18px; height:18px;}
.nav-item:hover{background:var(--bg3); color:var(--white);}
.nav-item.active{background:var(--red-glow); color:#fff; border:1px solid rgba(226,0,26,.5);}

.user-area {display:flex; align-items:center; gap:16px;}
.user-area .who{font-size:13px; color:var(--muted);}
.user-area .who b{color:var(--white); font-weight:600;}

.main-content {flex:1; width:100%; max-width:1400px; margin:0 auto; padding:30px; display:flex; flex-direction:column;}

.page-head{margin-bottom:30px; display:flex; justify-content:space-between; align-items:flex-end;}
.page-head h2{font-size:36px; font-weight:800; line-height:1.1;}
.page-head p{color:var(--muted); font-size:14px; margin-top:6px; font-weight:500;}

/* mobile bottom nav */
.bottom-nav{display:none;}
.burger{display:none;}

/* ---------- CARDS & GRIDS ---------- */
.grid{display:grid; gap:20px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.card{
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px; position:relative; overflow:hidden; box-shadow:var(--shadow);
}
.card .cap{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:12px;}
.card .val{font-family:var(--disp); font-size:42px; line-height:1;}
.card .val small{font-family:var(--body); font-size:14px; color:var(--muted); font-weight:600; text-transform:lowercase; letter-spacing:0;}
.stat-red::before{content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--red);}

.clock-card{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:linear-gradient(135deg, var(--bg3), var(--bg2));}
.clock-time{font-family:var(--disp); font-size:48px; letter-spacing:2px; text-shadow:0 0 20px rgba(255,255,255,.1);}
.clock-date{color:var(--red); font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-top:6px;}

.hero-photo{
  border-radius:var(--radius); overflow:hidden; position:relative;
  min-height:300px; display:flex; align-items:flex-end;
  background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop');
  background-size: cover; background-position: center;
  box-shadow:var(--shadow);
}
.hero-photo::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to top, rgba(9,9,11,0.9) 0%, rgba(9,9,11,0.2) 60%, transparent 100%);
}
.hero-photo .cap-box{position:relative; z-index:2; padding:30px; width:100%;}
.hero-photo .cap-box h3{font-size:32px; font-weight:800; text-shadow:0 2px 10px rgba(0,0,0,0.5);}
.hero-photo .cap-box p{color:#e4e4e7; font-size:14px; max-width:500px; font-weight:500; margin-top:8px;}

.list-row{
  display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border);
  font-size:14px; font-weight:500;
}
.list-row:last-child{border-bottom:none; padding-bottom:0;}
.badge{display:inline-flex; align-items:center; padding:4px 10px; border-radius:100px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;}
.badge.green{background:rgba(16, 185, 129, .15); color:var(--green); border:1px solid rgba(16,185,129,.2);}
.badge.red{background:rgba(226,0,26,.15); color:#ff5468; border:1px solid rgba(226,0,26,.2);}
.badge.amber{background:rgba(245, 158, 11, .15); color:var(--amber); border:1px solid rgba(245,158,11,.2);}
.badge.muted{background:var(--bg3); color:var(--muted); border:1px solid var(--border);}

.table-wrap{background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
.t-head, .t-row{display:grid; align-items:center; gap:12px; padding:16px 20px; font-size:14px;}
.t-head{background:var(--bg3); color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border);}
.t-row{border-bottom:1px solid var(--border); transition:background .2s;}
.t-row:last-child{border-bottom:none;}
.t-row:hover{background:rgba(255,255,255,.03);}
.tcell{font-weight:500;}

.toolbar{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; align-items:center;}
.toolbar input, .toolbar select{padding:12px 16px; background:var(--bg2); border:1px solid var(--border); border-radius:10px; color:var(--white); font-size:14px; min-width:250px;}
.spacer{flex:1;}

.tabs{display:flex; gap:8px; margin-bottom:24px; border-bottom:1px solid var(--border); flex-wrap:wrap; padding-bottom:8px;}
.tab{padding:10px 20px; font-size:14px; font-weight:600; color:var(--muted); border-radius:100px; cursor:pointer; transition:all .2s;}
.tab:hover{color:var(--white); background:var(--bg3);}
.tab.active{color:var(--white); background:var(--red); box-shadow:0 4px 12px rgba(226,0,26,.3);}

.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;}
.modal{background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);}
.modal.wide{max-width:800px;}
.modal h3{font-size:28px; font-family:var(--disp); margin-bottom:20px; font-weight:800;}
.modal-close{position:absolute; top:20px; right:24px; color:var(--muted); font-size:28px; cursor:pointer; transition:color .2s; line-height:1;}
.modal-close:hover{color:var(--red);}
.modal-actions{display:flex; gap:12px; justify-content:flex-end; margin-top:24px; border-top:1px solid var(--border); padding-top:20px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}

.empty{padding:60px 20px; text-align:center; color:var(--muted); font-size:14px; font-weight:500;}

/* EXERCISE SELECTION GRID */
.region-pills {display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;}
.region-pill {padding:8px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:100px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s;}
.region-pill:hover, .region-pill.active {background:var(--red); border-color:var(--red); color:#fff;}

.ex-grid {display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:16px; max-height:400px; overflow-y:auto; padding-right:8px;}
.ex-card-select {
  background:var(--bg3); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:all .2s;
  display:flex; flex-direction:column;
}
.ex-card-select:hover {transform:translateY(-3px); border-color:var(--red); box-shadow:0 8px 20px rgba(0,0,0,.4);}
.ex-card-select.selected {border:2px solid var(--red); background:rgba(226,0,26,.05);}
.ex-card-select img {width:100%; height:120px; object-fit:cover; border-bottom:1px solid var(--border);}
.ex-card-select .ex-info {padding:12px;}
.ex-card-select .ex-title {font-weight:700; font-size:14px; margin-bottom:4px;}
.ex-card-select .ex-meta {font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase;}

.exercise-card{background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; display:flex; gap:16px; align-items:center;}
.exercise-card img {width:90px; height:90px; border-radius:8px; object-fit:cover; flex-shrink:0; border:1px solid var(--border);}
.exercise-card .ex-body {flex:1;}
.exercise-card .ex-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.exercise-card h4{font-size:16px; font-weight:700; font-family:var(--body); text-transform:none;}
.exercise-card .region-tag{font-size:11px; color:var(--red); text-transform:uppercase; letter-spacing:1px; font-weight:800; margin-bottom:4px;}
.exercise-card p{color:var(--muted); font-size:13px; margin-top:6px; line-height:1.5; font-weight:400;}
.exercise-card .sr{font-size:13px; color:var(--white); margin-top:10px; font-weight:600; display:inline-block; background:var(--bg2); padding:4px 10px; border-radius:6px; border:1px solid var(--border);}
.exercise-card .sr span{color:var(--red);}

.day-block{margin-bottom:30px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px;}
.day-block h4{font-size:22px; font-family:var(--disp); margin-bottom:16px; display:flex; align-items:center; gap:10px;}
.day-block h4::before{content:''; width:12px; height:12px; background:var(--red); border-radius:3px; display:inline-block;}

/* stopwatch */
.stopwatch-face{
  width:300px; height:300px; border-radius:50%; border:8px solid var(--bg3); position:relative;
  display:flex; align-items:center; justify-content:center; margin:30px auto; background:radial-gradient(circle at 50% 30%, #1a1a1e, #09090b);
  box-shadow:0 0 0 2px var(--border), 0 0 60px rgba(226,0,26,.15) inset, 0 20px 40px rgba(0,0,0,0.5);
}
.stopwatch-face .sw-time{font-family:var(--disp); font-size:56px; letter-spacing:2px;}
.stopwatch-face .sw-ms{font-size:18px; color:var(--muted); font-family:var(--body); font-weight:600;}
.sw-controls{display:flex; gap:16px; justify-content:center; margin-top:20px;}
.sw-btn{width:70px; height:70px; border-radius:50%; border:none; font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:1px; transition:transform .2s;}
.sw-btn:active{transform:scale(0.95);}
.sw-btn.start{background:var(--green); color:#fff; box-shadow:0 10px 20px rgba(16,185,129,.3);}
.sw-btn.stop{background:var(--red); color:#fff; box-shadow:0 10px 20px rgba(226,0,26,.3);}
.sw-btn.lap{background:var(--bg3); color:#fff; border:1px solid var(--border);}
.laps{max-width:340px; margin:30px auto 0;}

@media (max-width:980px){
  .grid.cols-4{grid-template-columns:repeat(2,1fr);}
  .grid.cols-3{grid-template-columns:repeat(2,1fr);}
  .grid.cols-2{grid-template-columns:1fr;}
  .login-choice{grid-template-columns:1fr;}
}
@media (max-width:820px){
  .top-nav-bar .main-nav, .top-nav-bar .user-area {display:none;}
  .top-nav-bar {padding:14px 20px;}
  .burger{display:flex; width:40px; height:40px; border-radius:10px; background:var(--bg3); border:1px solid var(--border); align-items:center; justify-content:center; cursor:pointer;}
  .main-content{padding:20px 16px 100px;}
  .bottom-nav{
    display:flex; position:fixed; bottom:0; left:0; right:0; background:rgba(18, 18, 20, 0.95); backdrop-filter:blur(10px); border-top:1px solid var(--border);
    z-index:60; overflow-x:auto; padding:8px 4px; padding-bottom:calc(8px + env(safe-area-inset-bottom));
  }
  .bottom-nav .bn-item{
    flex:1; min-width:70px; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 4px; color:var(--muted); font-size:10px; font-weight:700; text-transform:uppercase;
  }
  .bottom-nav .bn-item svg{width:22px; height:22px;}
  .bottom-nav .bn-item.active{color:var(--red);}
  .t-head{display:none;}
  .t-row{grid-template-columns:1fr !important; gap:8px; padding:16px;}
  .t-row .tcell::before{content:attr(data-label); display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px;}
  .exercise-card {flex-direction:column; align-items:stretch;}
  .exercise-card img {width:100%; height:160px;}
}
</style>
</head>

function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '-'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function addDays(iso, days){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+Number(days)); return d.toISOString().slice(0,10); }
function addMonths(iso, months){ const d=new Date(iso+'T00:00:00'); d.setMonth(d.getMonth()+Number(months)); return d.toISOString().slice(0,10); }
function daysLeft(endIso){ return Math.round((new Date(endIso+'T00:00:00') - new Date(todayISO()+'T00:00:00'))/86400000); }
function money(n){ return Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:0})+' ₺'; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function findStudent(id){ return DATA.students.find(s=>s.id===id); }
function totalDebt(s){ return Math.max(0, Number(s.packageFee||0) - (s.payments||[]).reduce((a,p)=>a+Number(p.amount),0)); }

  };
  tick(); clockInterval = setInterval(tick, 1000);
}

function bizFreeze(page){
  const q = STATE.freezeSearch.toLowerCase();
  const students = DATA.students.filter(s=>(s.name+' '+s.surname).toLowerCase().includes(q));
  const pendingReqs = [];
  DATA.students.forEach(s=> (s.freezeRequests||[]).forEach(r=> pendingReqs.push({...r, studentId:s.id, studentName:s.name+' '+s.surname})));
  pendingReqs.sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  page.innerHTML = `
    <div class="page-head"><div><h2>Kayıt Dondurma</h2><p>Kayıtları dondurun ve sporcu taleplerini yönetin</p></div></div>
    <div class="tabs">
      <div class="tab ${STATE.freezeTab==='list'?'active':''}" data-tab="list">Sporcu Listesi</div>
      <div class="tab ${STATE.freezeTab==='requests'?'active':''}" data-tab="requests">Gelen İstekler ${pendingReqs.filter(r=>r.status==='pending').length? `<span class="badge red" style="margin-left:6px;">${pendingReqs.filter(r=>r.status==='pending').length}</span>`:''}</div>
    </div>
    <div id="freeze-body"></div>
  `;
  page.querySelectorAll('[data-tab]').forEach(el=> el.addEventListener('click', ()=>{ STATE.freezeTab = el.getAttribute('data-tab'); bizFreeze(page); }));
  const body = document.getElementById('freeze-body');

  if(STATE.freezeTab==='list'){
    body.innerHTML = `
      <div class="toolbar"><input type="text" id="freeze-search" placeholder="İsim ara..." value="${escapeHtml(STATE.freezeSearch)}"></div>
      <div class="table-wrap">
        <div class="t-head" style="grid-template-columns:1.6fr 1fr 1fr .8fr;"><div>Ad Soyad</div><div>Bitiş Tarihi</div><div>Durum</div><div></div></div>
        ${students.length? students.map(s=>`
          <div class="t-row" style="grid-template-columns:1.6fr 1fr 1fr .8fr;">
            <div class="tcell" data-label="Ad Soyad"><strong style="color:var(--white);">${escapeHtml(s.name)} ${escapeHtml(s.surname)}</strong></div>
            <div class="tcell" data-label="Bitiş">${fmtDate(s.endDate)}</div>
            <div class="tcell" data-label="Durum">${s.frozen? '<span class="badge amber">Donduruldu</span>':'<span class="badge green">Aktif</span>'}</div>
            <div class="tcell"><button class="btn sm danger" data-freeze="${s.id}">Dondur</button></div>
          </div>
        `).join('') : `<div class="empty">Sporcu bulunamadı.</div>`}
      </div>
    `;
    document.getElementById('freeze-search').addEventListener('input', e=>{ STATE.freezeSearch=e.target.value; bizFreeze(page); });
    body.querySelectorAll('[data-freeze]').forEach(el=> el.addEventListener('click', ()=> openFreezeModal(el.getAttribute('data-freeze'))));
  } else {
    body.innerHTML = `
      <div class="table-wrap">
        <div class="t-head" style="grid-template-columns:1.4fr .7fr 1.4fr 1fr 1fr;"><div>Sporcu</div><div>Süre</div><div>Sebep</div><div>Durum</div><div>İşlem</div></div>
        ${pendingReqs.length? pendingReqs.map(r=>`
          <div class="t-row" style="grid-template-columns:1.4fr .7fr 1.4fr 1fr 1fr;">
            <div class="tcell" data-label="Sporcu"><strong style="color:var(--white);">${escapeHtml(r.studentName)}</strong></div>
            <div class="tcell" data-label="Süre">${r.days} Gün</div>
            <div class="tcell" data-label="Sebep">${escapeHtml(r.reason)}</div>
            <div class="tcell" data-label="Durum">${r.status==='pending'?'<span class="badge amber">Bekliyor</span>':r.status==='approved'?'<span class="badge green">Onaylandı</span>':'<span class="badge red">Reddedildi</span>'}</div>
            <div class="tcell" style="display:flex; gap:8px;">${r.status==='pending'? `<button class="btn sm" data-approve="${r.studentId}|${r.id}">Onayla</button><button class="btn sm danger" data-reject="${r.studentId}|${r.id}">Reddet</button>`:''}</div>
          </div>
        `).join('') : `<div class="empty">Bekleyen istek yok.</div>`}
      </div>
    `;
    body.querySelectorAll('[data-approve]').forEach(el=> el.addEventListener('click', ()=>{
      const [sid, rid] = el.getAttribute('data-approve').split('|');
      const s = findStudent(sid); const r = s.freezeRequests.find(x=>x.id===rid);
      r.status='approved'; s.frozen=true; s.endDate = addDays(s.endDate, r.days);
      s.freezeHistory = s.freezeHistory||[]; s.freezeHistory.push({id:uid(), date:todayISO(), days:r.days, reason:r.reason});
      saveData(); bizFreeze(page);
    }));
    body.querySelectorAll('[data-reject]').forEach(el=> el.addEventListener('click', ()=>{
      const [sid, rid] = el.getAttribute('data-reject').split('|');
      const s = findStudent(sid); const r = s.freezeRequests.find(x=>x.id===rid);
      r.status='rejected'; saveData(); bizFreeze(page);
    }));
  }
}

          <div class="region-pills" id="pe-region-pills"></div>
          
          <div class="ex-grid" id="pe-ex-grid"></div>

          <div id="pe-details" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
            <div class="row2">
              <div class="field"><label>Set</label><input type="number" id="pe-sets" value="4"></div>
              <div class="field"><label>Tekrar</label><input type="text" id="pe-reps" value="12"></div>
            </div>
            <div class="field" style="margin-bottom:0;"><label>Açıklama / Taktik</label><textarea id="pe-desc" rows="2"></textarea></div>
            <button class="btn block" id="pe-add-btn" style="margin-top:16px;">+ Programa Ekle</button>
          </div>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  const close = ()=>{ document.getElementById('modal-bg').remove(); if(onDone) onDone(); };
  document.getElementById('modal-close').addEventListener('click', close);

  function renderRegions(){
    const pContainer = document.getElementById('pe-region-pills');
    pContainer.innerHTML = Object.keys(EXLIB).map(r=> `<div class="region-pill ${r===selectedRegion?'active':''}" data-reg="${r}">${r}</div>`).join('');
    pContainer.querySelectorAll('.region-pill').forEach(el=> el.addEventListener('click', ()=>{
      selectedRegion = el.getAttribute('data-reg'); selectedExName = null;
      document.getElementById('pe-details').style.display = 'none';
      renderRegions(); renderExGrid();
    }));
  }

  function renderExGrid(){
    const gContainer = document.getElementById('pe-ex-grid');
    const exercises = EXLIB[selectedRegion];
    gContainer.innerHTML = exercises.map(ex=> `
      <div class="ex-card-select ${ex.name===selectedExName?'selected':''}" data-ex="${ex.name}">
        <img src="${ex.img}" alt="${ex.name}">
        <div class="ex-info"><div class="ex-meta">${selectedRegion}</div><div class="ex-title">${escapeHtml(ex.name)}</div></div>
      </div>
    `).join('');
    
    gContainer.querySelectorAll('.ex-card-select').forEach(el=> el.addEventListener('click', ()=>{
      selectedExName = el.getAttribute('data-ex');
      renderExGrid();
      const exData = exercises.find(x=>x.name===selectedExName);
      document.getElementById('pe-sets').value = exData.sets;
      document.getElementById('pe-reps').value = exData.reps;
      document.getElementById('pe-desc').value = exData.desc;
      document.getElementById('pe-details').style.display = 'block';
    }));
  }

  function renderCurrentList(){
    const grouped = document.getElementById('pe-grouped').checked;
    document.getElementById('pe-day').style.display = grouped? 'block':'none';
    const body = document.getElementById('pe-list-area');
    
    function makeCard(it, day, idx){
      return `<div class="exercise-card">
        <img src="${it.img}">
        <div class="ex-body">
          <div class="ex-top"><div><div class="region-tag">${it.region}</div><h4>${escapeHtml(it.name)}</h4></div><button class="btn sm danger" data-rm="${(day||'_')+'|'+idx}">Sil</button></div>
          <p>${escapeHtml(it.desc)}</p>
          <div class="sr"><span>${it.sets} SET</span> × <span>${it.reps}</span></div>
        </div>
      </div>`;
    }

    if(grouped){
      body.innerHTML = DAYS.map(d=>{
        const items = (prog.days[d]||[]);
        if(!items.length) return ''; 
        return `<div class="day-block"><h4>${d}</h4>${items.map((it,i)=>makeCard(it, d, i)).join('')}</div>`;
      }).join('') || `<div class="empty">Henüz hiçbir güne egzersiz eklenmedi. Aşağıdan eklemeye başlayın.</div>`;
    } else {
      const items = prog.list||[];
      body.innerHTML = items.length? items.map((it,i)=>makeCard(it, null, i)).join('') : `<div class="empty">Henüz egzersiz eklenmedi.</div>`;
    }

    body.querySelectorAll('[data-rm]').forEach(el=> el.addEventListener('click', ()=>{
      const [day, idx] = el.getAttribute('data-rm').split('|');
      if(day==='_'){ prog.list.splice(Number(idx),1); } else { prog.days[day].splice(Number(idx),1); }
      saveData(); renderCurrentList();
    }));
  }

  document.getElementById('pe-grouped').addEventListener('change', e=>{ prog.grouped = e.target.checked; saveData(); renderCurrentList(); });
  document.getElementById('pe-add-btn').addEventListener('click', ()=>{
    if(!selectedExName) return;
    const grouped = document.getElementById('pe-grouped').checked;
    const exData = EXLIB[selectedRegion].find(x=>x.name===selectedExName);
    const item = { 
      region: selectedRegion, name: selectedExName, img: exData.img,
      sets: Number(document.getElementById('pe-sets').value)||3, reps: document.getElementById('pe-reps').value||'12', desc: document.getElementById('pe-desc').value.trim() 
    };
    if(grouped){
      const day = document.getElementById('pe-day').value;
      prog.days[day] = prog.days[day]||[]; prog.days[day].push(item);
    } else {
      prog.list = prog.list||[]; prog.list.push(item);
    }
    saveData(); 
    selectedExName = null; 
    document.getElementById('pe-details').style.display = 'none';
    renderRegions(); renderExGrid(); renderCurrentList();
  });

  renderRegions(); renderExGrid(); renderCurrentList();
}

/* ---------- ATHLETE: QR TARAYICI EKRANI ---------- */
function athScan(page, s){
  page.innerHTML = `
    <div class="page-head"><div><h2>Turnike QR Okuyucu</h2><p>Salona giriş veya çıkış yapmak için arka kameranızla gişedeki QR kodu okutun.</p></div></div>

       <div id="qr-reader" style="width:100%; max-width:400px; border-radius:16px; overflow:hidden; border:2px solid var(--border); box-shadow:0 10px 30px rgba(0,0,0,.5);"></div>
       
       <div id="scan-result" style="margin-top:24px; font-family:var(--disp); font-size:24px; min-height:30px;">
          </div>
       
       <div style="margin-top:20px; font-size:14px; color:var(--muted); background:var(--bg3); padding:12px 20px; border-radius:100px;">
          Mevcut Durumunuz: <strong style="color:${s.checkedIn ? 'var(--green)' : 'var(--white)'};">${s.checkedIn ? 'Salondasınız (Giriş Yapıldı)' : 'Salonda Değilsiniz'}</strong>
       </div>
    </div>
  `;

  window.html5QrCode = new Html5Qrcode("qr-reader");
  const qrCodeSuccessCallback = (decodedText, decodedResult) => {
      if(decodedText === "APEX_GYM_CHECKIN") {
          stopScanner();
          
          s.checkedIn = !s.checkedIn;
          saveData(); 
          
          const resDiv = document.getElementById("scan-result");
          if(s.checkedIn){
             resDiv.innerHTML = `<span style="color:var(--green)">GİRİŞ BAŞARILI! <br><small style="font-family:var(--body); font-size:14px; color:var(--white);">İyi antrenmanlar dileriz.</small></span>`;
          } else {
             resDiv.innerHTML = `<span style="color:var(--amber)">ÇIKIŞ BAŞARILI! <br><small style="font-family:var(--body); font-size:14px; color:var(--white);">Geçmiş olsun, tekrar bekleriz.</small></span>`;
          }
          setTimeout(()=>{ render(); }, 3000);
      }
  };

  const config = { fps: 10, qrbox: { width: 250, height: 250 } };
  window.html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
  .catch((err) => {
      document.getElementById("scan-result").innerHTML = `<span style="color:var(--red); font-family:var(--body); font-size:14px;">Kamera başlatılamadı. Lütfen cihaz ayarlarından kamera izni verin.</span>`;
  });
}

/* ---------- ATHLETE: KRONOMETRE ---------- */
let swState = { running:false, startTs:0, elapsed:0, laps:[], interval:null };
function athTimer(page, s){ 
  page.innerHTML = `
    <div class="page-head"><div><h2>Kronometre</h2><p>Dinlenme sürelerini veya set sürelerini ölçün</p></div></div>
    <div class="card" style="padding:40px 20px;">
      <div class="stopwatch-face"><div><div class="sw-time" id="sw-time">00:00</div><div class="sw-ms" id="sw-ms" style="text-align:center;">.00</div></div></div>
      <div class="sw-controls">
        <button class="sw-btn lap" id="sw-reset">Sıfırla</button>
        <button class="sw-btn ${swState.running?'stop':'start'}" id="sw-toggle" style="transform:scale(1.2); margin:0 10px;">${swState.running?'Durdur':'Başlat'}</button>
        <button class="sw-btn lap" id="sw-lap">Tur</button>
      </div>
      <div class="laps" id="sw-laps" style="margin-top:40px;"></div>
    </div>
  `;
  renderSwTime(); renderLaps();
  
  document.getElementById('sw-toggle').addEventListener('click', ()=>{
    if(swState.running){
      swState.running=false; swState.elapsed += Date.now()-swState.startTs; clearInterval(swState.interval);
    } else {
      swState.running=true; swState.startTs=Date.now();
      swState.interval = setInterval(renderSwTime, 47);
    }
    athTimer(page, s);
  });
  
  document.getElementById('sw-lap').addEventListener('click', ()=>{
    if(swState.running || swState.elapsed>0){
      const total = swState.elapsed + (swState.running? Date.now()-swState.startTs : 0);
      swState.laps.push(total); renderLaps();
    }
  });
  
  document.getElementById('sw-reset').addEventListener('click', ()=>{
    clearInterval(swState.interval); swState = {running:false, startTs:0, elapsed:0, laps:[], interval:null}; athTimer(page, s);
  });
}

function fmtStopwatch(ms){
  const totalSec = Math.floor(ms/1000);
  const mm = String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss = String(totalSec%60).padStart(2,'0');
  const cs = String(Math.floor((ms%1000)/10)).padStart(2,'0');
  return {main:`${mm}:${ss}`, ms:'.'+cs};
}

function renderSwTime(){
  const t = document.getElementById('sw-time'); if(!t) return;
  const total = swState.elapsed + (swState.running? Date.now()-swState.startTs : 0);
  const f = fmtStopwatch(total);
  t.textContent = f.main; document.getElementById('sw-ms').textContent = f.ms;
}

function renderLaps(){
  const el = document.getElementById('sw-laps'); if(!el) return;
  el.innerHTML = swState.laps.length? swState.laps.slice().reverse().map((l,i)=>{
    const idx = swState.laps.length-i;
    return `<div class="list-row" style="background:var(--bg3); padding:12px 16px; border-radius:10px; margin-bottom:8px; border:none;"><span><strong style="color:var(--muted);">TUR ${idx}</strong></span><span style="font-family:var(--disp); font-size:20px;">${fmtStopwatch(l).main}<small style="font-family:var(--body); font-size:14px; color:var(--muted);">${fmtStopwatch(l).ms}</small></span></div>`;
  }).join('') : `<div class="empty">Tur kaydedilmedi.</div>`;
}
